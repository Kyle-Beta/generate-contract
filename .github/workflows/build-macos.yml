name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x64
            pyinstaller_arch: x86_64
            zip_name: contract-generator-macos-intel.zip
          - runner: macos-14
            arch: arm64
            pyinstaller_arch: arm64
            zip_name: contract-generator-macos-apple-silicon.zip
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Generate macOS icon from app.ico
        run: |
          mkdir -p build/icon.iconset
          sips -s format png app.ico --out build/icon_1024.png
          for size in 16 32 64 128 256 512; do
            sips -z $size $size build/icon_1024.png --out build/icon.iconset/icon_${size}x${size}.png
          done
          sips -z 32 32 build/icon_1024.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 64 64 build/icon_1024.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 256 256 build/icon_1024.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 512 512 build/icon_1024.png --out build/icon.iconset/icon_256x256@2x.png
          cp build/icon_1024.png build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/app.icns

      - name: Build app bundle
        run: |
          export MACOS_TARGET_ARCH='${{ matrix.pyinstaller_arch }}'
          pyinstaller generate_contracts_macos.spec --noconfirm

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/合同批量生成器.app" "dist/${{ matrix.zip_name }}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-generator-macos-app-${{ matrix.arch }}
          path: dist/合同批量生成器.app

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-generator-macos-zip-${{ matrix.arch }}
          path: dist/${{ matrix.zip_name }}
