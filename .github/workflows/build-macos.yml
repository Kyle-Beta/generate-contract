name: Build macOS App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x64
            pyinstaller_arch: x86_64
            zip_name: contract-generator-macos-intel.zip
          - runner: macos-14
            arch: arm64
            pyinstaller_arch: arm64
            zip_name: contract-generator-macos-apple-silicon.zip
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app bundle
        run: |
          export MACOS_TARGET_ARCH='${{ matrix.pyinstaller_arch }}'
          pyinstaller generate_contracts_macos.spec --noconfirm

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/合同批量生成器.app" "dist/${{ matrix.zip_name }}"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-generator-macos-app-${{ matrix.arch }}
          path: dist/合同批量生成器.app

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-generator-macos-zip-${{ matrix.arch }}
          path: dist/${{ matrix.zip_name }}
